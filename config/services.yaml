parameters:
    facebook_graph_url: 'https://graph.facebook.com/v18.0'
    frontend_url: '%env(FRONTEND_URL)%'
    mailer_sender: '%env(MAILER_SENDER)%'

services:
    _defaults:
        autowire: true
        autoconfigure: true

    App\:
        resource: '../src/'
        exclude:
            - '../src/DependencyInjection/'
            - '../src/Entity/'
            - '../src/Kernel.php'
            - '../src/**/Dto/'
            - '../src/**/Enum/'

    App\Auth\Service\FacebookAuthService:
        arguments:
            $facebookGraphUrl: '%facebook_graph_url%'

    App\Auth\MessageHandler\SendPasswordResetEmailHandler:
        arguments:
            $frontendUrl: '%frontend_url%'

    App\Reminder\MessageHandler\SendReminderEmailHandler:
        arguments:
            $frontendUrl: '%frontend_url%'
            $fromAddress: '%mailer_sender%'

    App\Notification\MessageHandler\:
        resource: '../src/Notification/MessageHandler/'
        bind:
            $fromAddress: '%mailer_sender%'

    App\Subscription\Command\ExpireTrialsCommand:
        arguments:
            $frontendUrl: '%frontend_url%'

    App\Subscription\Command\SendTrialRemindersCommand:
        arguments:
            $frontendUrl: '%frontend_url%'

    App\Subscription\MessageHandler\:
        resource: '../src/Subscription/MessageHandler/'
        bind:
            $fromAddress: '%mailer_sender%'

    App\Common\Service\CaptchaValidatorInterface:
        alias: App\Common\Service\CaptchaValidatorService

    App\Common\Service\CaptchaValidatorService:
        arguments:
            $turnstileSecretKey: '%env(TURNSTILE_SECRET_KEY)%'

    App\Subscription\Service\MomoPaymentService:
        arguments:
            $partnerCode: '%env(MOMO_PARTNER_CODE)%'
            $accessKey: '%env(MOMO_ACCESS_KEY)%'
            $secretKey: '%env(MOMO_SECRET_KEY)%'
            $env: '%env(MOMO_ENV)%'
            $ipnUrl: '%env(APP_URL)%/webhooks/momo/ipn'
            $redirectUrl: '%frontend_url%/dashboard/subscription?payment=success'

    App\Subscription\Controller\CreateCheckoutSessionController:
        arguments:
            $proMonthlyPriceVnd: '%subscription.pro_monthly_price_vnd%'

    App\Subscription\MessageHandler\SendPaymentSuccessEmailHandler:
        arguments:
            $fromAddress: '%mailer_sender%'
            $frontendUrl: '%frontend_url%'

    App\Subscription\MessageHandler\SendRenewalReminderEmailHandler:
        arguments:
            $fromAddress: '%mailer_sender%'
            $frontendUrl: '%frontend_url%'

    App\Common\EventListener\ApiExceptionListener:
        tags:
            - { name: kernel.event_listener, event: kernel.exception, priority: 10 }

    App\Subscription\EventListener\SubscriptionGuard:
        tags:
            - { name: kernel.event_listener, event: kernel.request, priority: -10 }