health:
    resource:
        path: ../src/Health/Controller/
        namespace: App\Health\Controller
    type: attribute

auth:
    resource:
        path: ../src/Auth/Controller/
        namespace: App\Auth\Controller
    type: attribute
    prefix: /api/v1/auth

shop:
    resource:
        path: ../src/Shop/Controller/
        namespace: App\Shop\Controller
    type: attribute
    prefix: /api/v1/shops

client:
    resource:
        path: ../src/Client/Controller/
        namespace: App\Client\Controller
    type: attribute
    prefix: /api/v1/clients

appointment:
    resource:
        path: ../src/Appointment/Controller/
        namespace: App\Appointment\Controller
    type: attribute
    prefix: /api/v1/appointments
    exclude: ../src/Appointment/Controller/PublicAvailableSlotsController.php

reminder:
    resource:
        path: ../src/Reminder/Controller/
        namespace: App\Reminder\Controller
    type: attribute
    prefix: /api/v1/reminders

subscription:
    resource:
        path: ../src/Subscription/Controller/
        namespace: App\Subscription\Controller
    type: attribute
    prefix: /api/v1

reminder_opt_out:
    resource: App\Reminder\Controller\ReminderOptOutController
    type: attribute

public_booking:
    resource:
        path: ../src/PublicBooking/Controller/
        namespace: App\PublicBooking\Controller
    type: attribute
    prefix: /api/v1/public/shops
