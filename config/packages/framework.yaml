framework:
    secret: '%env(APP_SECRET)%'
    http_method_override: false
    handle_all_throwables: true

    php_errors:
        log: true

    serializer:
        enabled: true

    validation:
        enabled: true
        enable_attributes: true

    rate_limiter:
        login:
            policy: sliding_window
            limit: 10
            interval: '1 minute'
        registration:
            policy: sliding_window
            limit: 5
            interval: '1 hour'
        api:
            policy: sliding_window
            limit: 60
            interval: '1 minute'
        password_reset:
            policy: sliding_window
            limit: 3
            interval: '1 hour'
        public_shop_read:
            policy: sliding_window
            limit: 30
            interval: '1 minute'
        public_booking:
            policy: sliding_window
            limit: 5
            interval: '1 minute'
        upgrade_request:
            policy: sliding_window
            limit: 3
            interval: '1 hour'