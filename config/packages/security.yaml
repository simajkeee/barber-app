security:
    password_hashers:
        Symfony\Component\Security\Core\User\PasswordAuthenticatedUserInterface: 'auto'

    providers:
        app_user_provider:
            entity:
                class: App\Entity\User
                property: email

    firewalls:
        dev:
            pattern: ^/(_(profiler|wdt)|css|images|js)/
            security: false

        api:
            pattern: ^/api
            stateless: true
            jwt: ~

    access_control:
        - { path: ^/health$, roles: PUBLIC_ACCESS }
        - { path: ^/api/v1/auth/register$, roles: PUBLIC_ACCESS }
        - { path: ^/api/v1/auth/login$, roles: PUBLIC_ACCESS }
        - { path: ^/api/v1/auth/facebook$, roles: PUBLIC_ACCESS }
        - { path: ^/api/v1/auth/refresh$, roles: PUBLIC_ACCESS }
        - { path: ^/api/v1/auth/forgot-password$, roles: PUBLIC_ACCESS }
        - { path: ^/api/v1/auth/reset-password$, roles: PUBLIC_ACCESS }
        - { path: ^/api/v1/public, roles: PUBLIC_ACCESS }
        - { path: ^/api/v1/admin, roles: ROLE_ADMIN }
        - { path: ^/api, roles: IS_AUTHENTICATED_FULLY }