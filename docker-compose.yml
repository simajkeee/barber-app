services:
  php:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    volumes:
      - .:/app
    depends_on:
      database:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://barber:barber@database:5432/barber_app?serverVersion=16&charset=utf8
    networks:
      - barber

  caddy:
    image: caddy:2-alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./docker/caddy/Caddyfile:/etc/caddy/Caddyfile
      - ./public:/app/public
    depends_on:
      - php
    networks:
      - barber

  claude:
    build:
      context: .
      dockerfile: docker/claude/Dockerfile
    volumes:
      - .:/app
      - ./.claude:/home/claude/.claude
      - ~/.claude/skills:/home/claude/.claude/skills
      - ~/.claude/commands:/home/claude/.claude/commands
      - ~/.claude/plugins:${HOME}/.claude/plugins
      - ~/.claude/projects/-Users-aleksandrkarelin-Projects-barber-app:/home/claude/.claude/projects/-app
      - /var/run/docker.sock:/var/run/docker.sock
    environment:
      DATABASE_URL: postgresql://barber:barber@database:5432/barber_app?serverVersion=16&charset=utf8
      HOST_HOME: ${HOME}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      database:
        condition: service_healthy
    networks:
      - barber
    stdin_open: true
    tty: true

  database:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: barber_app
      POSTGRES_USER: barber
      POSTGRES_PASSWORD: barber
    ports:
      - "5432:5432"
    volumes:
      - db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U barber -d barber_app"]
      interval: 3s
      timeout: 3s
      retries: 10
    networks:
      - barber

volumes:
  db_data:

networks:
  barber: