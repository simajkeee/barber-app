services:
  php:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    volumes:
      - .:/app
    depends_on:
      database:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://barber:barber@database:5432/barber_app?serverVersion=16&charset=utf8
    networks:
      - barber

  caddy:
    image: caddy:2-alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./docker/caddy/Caddyfile:/etc/caddy/Caddyfile
      - ./public:/app/public
    depends_on:
      - php
    networks:
      - barber

  database:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: barber_app
      POSTGRES_USER: barber
      POSTGRES_PASSWORD: barber
    ports:
      - "5432:5432"
    volumes:
      - db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U barber -d barber_app"]
      interval: 3s
      timeout: 3s
      retries: 10
    networks:
      - barber

volumes:
  db_data:

networks:
  barber: